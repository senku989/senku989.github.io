<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elf Girl 3D Model</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0f0f0f;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: white;
        }
        h1 {
            margin: 20px 0 10px;
        }
        model-viewer {
            width: 90%;
            max-width: 900px;
            height: 70vh;
            background-color: #1a1a1a;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.6);
        }
        .info {
            margin-top: 15px;
            text-align: center;
            max-width: 600px;
        }
    </style>
</head>
<body>
    <h1>علكة مينتوس</h1>
    
    <model-viewer 
        src="3d_pic.glb" 
        alt="Elf Girl 3D Model" 
        camera-controls 
        auto-rotate 
        shadow-intensity="1.5" 
        exposure="0.8"
        environment-intensity="0.8"
        ar 
        ar-modes="webxr scene-viewer quick-look"
        style="background-color: #1a1a1a;">
    </model-viewer>

    <div class="info">
        <p>اسحب بالماوس أو بالإصبع للدوران • اسحب للأعلى/الأسفل للتكبير • اضغط على زر AR للتجربة بالواقع المعزز (على الجوال)</p>
    </div>

    <!-- زر لتحميل الموديل -->
    <a href="3d_pic.glb" download="3d_pic.glb" style="margin-top: 20px; padding: 10px 20px; background: #4a90e2; color: white; text-decoration: none; border-radius: 8px;">
        تحميل الموديل (GLB)
    </a>

</body>
</html>
