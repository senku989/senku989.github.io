<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أداة صيد الإحداثيات - لايف</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
    <style>
        body { margin: 0; padding: 20px; font-family: 'Segoe UI', sans-serif; background: #121212; color: white; direction: rtl; }
        
        /* شريط الرادار العلوي */
        .live-monitor {
            position: sticky; top: 0; z-index: 100;
            background: rgba(255, 51, 102, 0.9);
            padding: 10px; border-radius: 10px;
            display: flex; justify-content: center; gap: 20px;
            margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            backdrop-filter: blur(5px); border: 1px solid #ff5588;
        }
        .monitor-item { font-family: monospace; font-size: 1.1em; font-weight: bold; }
        .monitor-item span { color: #00ff88; }

        .container { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
        model-viewer { flex: 2; min-width: 500px; height: 70vh; background: #1e1e1e; border-radius: 15px; cursor: crosshair; }
        
        .controls-panel { flex: 1; min-width: 320px; background: #1e1e1e; border-radius: 15px; padding: 15px; max-height: 70vh; overflow-y: auto; }
        .hotspot-card { background: #2d2d2d; padding: 12px; border-radius: 10px; margin-bottom: 15px; border-right: 5px solid #ff3366; }
        .inputs { display: flex; gap: 8px; align-items: center; margin-top: 10px; }
        input { width: 65px; background: #3d3d3d; border: 1px solid #555; color: white; padding: 5px; border-radius: 5px; text-align: center; }
        
        .hotspot {
            width: 25px; height: 25px; border-radius: 50%; border: 2px solid #fff;
            background: #00ff88; display: flex; justify-content: center; align-items: center;
        }
        .hotspot span { font-size: 14px; color: black; font-weight: bold; }
        
        .hint { font-size: 0.8em; color: #aaa; text-align: center; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="live-monitor">
        <div class="monitor-item">X: <span id="live-x">0.00</span></div>
        <div class="monitor-item">Y: <span id="live-y">0.00</span></div>
        <div class="monitor-item">Z: <span id="live-z">0.00</span></div>
        <div style="font-size: 0.8em; align-self: center; opacity: 0.8;">(مرر الفأرة فوق المودل)</div>
    </div>

    <h1>🎯 صياد النقاط الذكي</h1>
    <p class="hint">حرك الفأرة فوق المكان المطلوب، ثم انقل الأرقام الظاهرة في الأعلى إلى مربعات النقاط أدناه.</p>

    <div class="container">
        <model-viewer id="viewer" src="3d_pic.glb" camera-controls shadow-intensity="1">
            <button slot="hotspot-1" id="hp-1" class="hotspot" data-position="-0.35m 1.1m 0.3m"><span>1</span></button>
            <button slot="hotspot-2" id="hp-2" class="hotspot" data-position="-0.3m 0.55m 0.35m"><span>2</span></button>
            <button slot="hotspot-3" id="hp-3" class="hotspot" data-position="0.35m 1.1m 0.3m"><span>3</span></button>
            <button slot="hotspot-4" id="hp-4" class="hotspot" data-position="0.3m 0.55m 0.35m"><span>4</span></button>
        </model-viewer>

        <div class="controls-panel">
            <div id="controls"></div>
            <button id="copyBtn" style="width:100%; padding:15px; background:#2c8c5a; border:none; color:white; border-radius:8px; cursor:pointer; font-weight:bold;">📋 نسخ الكود النهائي</button>
            <pre id="finalCode" style="font-size:0.7em; background:#000; padding:10px; margin-top:10px; color:#00ff88; border-radius:5px; overflow-x:auto;"></pre>
        </div>
    </div>

    <script>
        const viewer = document.getElementById('viewer');
        const liveX = document.getElementById('live-x');
        const liveY = document.getElementById('live-y');
        const liveZ = document.getElementById('live-z');

        // 1. ميزة القراءة المباشرة (Live Tracking)
        viewer.addEventListener('mousemove', (event) => {
            // تحويل موقع الفأرة لمكان في الفضاء الثلاثي
            const hit = viewer.positionAndNormalFromPoint(event.clientX, event.clientY);
            if (hit) {
                const { x, y, z } = hit.position;
                liveX.innerText = x.toFixed(3);
                liveY.innerText = y.toFixed(3);
                liveZ.innerText = z.toFixed(3);
            }
        });

        // 2. إدارة النقاط الأربعة
        const points = [
            { id: 1, label: "اليسرى 1", x: -0.35, y: 1.1, z: 0.3 },
            { id: 2, label: "اليسرى 2", x: -0.30, y: 0.55, z: 0.35 },
            { id: 3, label: "اليمنى 1", x: 0.35, y: 1.1, z: 0.3 },
            { id: 4, label: "اليمنى 2", x: 0.30, y: 0.55, z: 0.35 }
        ];

        const controls = document.getElementById('controls');
        points.forEach(p => {
            const card = document.createElement('div');
            card.className = 'hotspot-card';
            card.innerHTML = `
                <div style="font-size:0.8em; color:#ff99bb;">📍 نقطة ${p.id}: ${p.label}</div>
                <div class="inputs">
                    <input type="number" step="0.001" value="${p.x}" data-point="${p.id}" data-axis="x">
                    <input type="number" step="0.001" value="${p.y}" data-point="${p.id}" data-axis="y">
                    <input type="number" step="0.001" value="${p.z}" data-point="${p.id}" data-axis="z">
                </div>
            `;
            controls.appendChild(card);
        });

        function updateAll() {
            let code = "";
            points.forEach(p => {
                const x = document.querySelector(`input[data-point="${p.id}"][data-axis="x"]`).value;
                const y = document.querySelector(`input[data-point="${p.id}"][data-axis="y"]`).value;
                const z = document.querySelector(`input[data-point="${p.id}"][data-axis="z"]`).value;
                
                const hp = document.getElementById(`hp-${p.id}`);
                const pos = `${x}m ${y}m ${z}m`;
                hp.setAttribute('data-position', pos);
                code += `<button slot="hotspot-${p.id}" data-position="${pos}" data-normal="0 1 0"></button>\n`;
            });
            document.getElementById('finalCode').innerText = code;
        }

        document.querySelectorAll('input').forEach(i => i.addEventListener('input', updateAll));
        document.getElementById('copyBtn').onclick = () => {
            navigator.clipboard.writeText(document.getElementById('finalCode').innerText);
            alert("تم نسخ الكود!");
        };

        updateAll();
    </script>
</body>
</html>
