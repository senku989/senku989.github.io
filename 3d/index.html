<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ضبط نقاط ريو ريبر - النسخة المصححة</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
    <style>
        body { margin: 0; padding: 20px; font-family: Arial, sans-serif; background: #1a1a1a; color: white; direction: rtl; }
        h1 { text-align: center; color: #ff3366; }
        .container { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
        model-viewer { flex: 2; min-width: 600px; height: 70vh; background: #2a2a2a; border-radius: 16px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .controls-panel { flex: 1; min-width: 280px; background: #2a2a2a; border-radius: 16px; padding: 20px; overflow-y: auto; max-height: 70vh; }
        .hotspot-control { background: #3a3a3a; margin-bottom: 20px; padding: 15px; border-radius: 12px; border-right: 4px solid #ff3366; }
        .hotspot-control h3 { margin: 0 0 10px 0; color: #ff99bb; }
        .coord-group { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; flex-wrap: wrap; }
        input { width: 70px; padding: 6px; border-radius: 8px; border: none; text-align: center; background: #555; color: white; }
        button { background: #ff3366; border: none; color: white; padding: 8px 12px; border-radius: 8px; cursor: pointer; }
        .reset-btn { background: #666; font-size: 0.8em; }
        .coord-display { font-family: monospace; background: #111; padding: 8px; border-radius: 8px; margin-top: 10px; font-size: 0.9em; }
        
        /* تصميم النقطة العائمة */
        .hotspot {
            display: flex; align-items: center; justify-content: center;
            width: 40px; height: 40px;
            background: #00ff88; border-radius: 50%; border: 2px solid white;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.6); cursor: pointer;
        }
        .hotspot:not([data-position]) { display: none; } /* إخفاء في حال فقدان الإحداثيات */
    </style>
</head>
<body>
    <h1>🔧 أداة ضبط النقاط (النسخة المصححة)</h1>
    <p style="text-align:center;">إذا كانت النقطة مختفية، زد قيمة <strong>Z</strong> لجعلها تخرج من داخل المجسم.</p>

    <div class="container">
        <model-viewer id="viewer"
            src="3d_pic.glb" 
            camera-controls
            auto-rotate
            shadow-intensity="1"
            camera-orbit="45deg 75deg 3m">

            <button slot="hotspot-left1" class="hotspot" data-position="-0.4m 1.0m 0.5m" data-normal="0 1 0">
                <span class="material-symbols-outlined">info</span>
            </button>
            <button slot="hotspot-left2" class="hotspot" data-position="-0.4m 0.5m 0.5m" data-normal="0 1 0">
                <span class="material-symbols-outlined">info</span>
            </button>
            <button slot="hotspot-right1" class="hotspot" data-position="0.4m 1.0m 0.5m" data-normal="0 1 0">
                <span class="material-symbols-outlined">info</span>
            </button>
            <button slot="hotspot-right2" class="hotspot" data-position="0.4m 0.5m 0.5m" data-normal="0 1 0">
                <span class="material-symbols-outlined">info</span>
            </button>
        </model-viewer>

        <div class="controls-panel">
            <div class="hotspot-control">
                <h3>📍 النقطة 1</h3>
                <div class="coord-group">
                    X: <input type="number" id="l1-x" step="0.01" value="-0.40">
                    Y: <input type="number" id="l1-y" step="0.01" value="1.00">
                    Z: <input type="number" id="l1-z" step="0.01" value="0.50">
                </div>
                <div class="coord-display" id="d1">(-0.40, 1.00, 0.50)</div>
            </div>

            <div class="hotspot-control">
                <h3>📍 النقطة 2</h3>
                <div class="coord-group">
                    X: <input type="number" id="l2-x" step="0.01" value="-0.40">
                    Y: <input type="number" id="l2-y" step="0.01" value="0.50">
                    Z: <input type="number" id="l2-z" step="0.01" value="0.50">
                </div>
                <div class="coord-display" id="d2">(-0.40, 0.50, 0.50)</div>
            </div>

            <button id="copyAllBtn" style="width:100%; background:#2c8c5a;">📋 نسخ الكود النهائي</button>
        </div>
    </div>

    <script type="module">
        const viewer = document.getElementById('viewer');

        function updateAll() {
            const points = [
                {id: 'l1', slot: 'hotspot-left1', disp: 'd1'},
                {id: 'l2', slot: 'hotspot-left2', disp: 'd2'}
            ];

            points.forEach(p => {
                const x = document.getElementById(`${p.id}-x`).value;
                const y = document.getElementById(`${p.id}-y`).value;
                const z = document.getElementById(`${p.id}-z`).value;
                
                const btn = viewer.querySelector(`button[slot="${p.slot}"]`);
                if(btn) {
                    // الطريقة الصحيحة لتحديث الإحداثيات في model-viewer
                    btn.dataset.position = `${x}m ${y}m ${z}m`;
                    document.getElementById(p.disp).textContent = `(${x}, ${y}, ${z})`;
                }
            });
        }

        // إضافة مستمعات الأحداث لكل المدخلات
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('input', updateAll);
        });

        // زر النسخ
        document.getElementById('copyAllBtn').onclick = () => {
            let output = "";
            document.querySelectorAll('.hotspot').forEach(btn => {
                output += btn.outerHTML + "\n";
            });
            navigator.clipboard.writeText(output);
            alert("تم نسخ كود النقاط!");
        };
    </script>
</body>
</html>
