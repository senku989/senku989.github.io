<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ريو ريبر | Gachiakuta</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0a0a0a;
            font-family: Arial, sans-serif;
            color: white;
            text-align: center;
        }
        h1 {
            margin: 20px 0 5px;
            font-size: 2.4em;
            color: #ff3366;
        }
        .subtitle {
            color: #ff6699;
            margin-bottom: 20px;
        }
        model-viewer {
            width: 100%;
            max-width: 900px;
            height: 65vh;
            background-color: #1a1a1a;
            border-radius: 16px;
            box-shadow: 0 0 40px rgba(255, 51, 102, 0.3);
            margin: 0 auto;
        }
        .controls {
            margin: 20px auto;
            max-width: 800px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }
        button {
            padding: 10px 18px;
            background: #2a2a2a;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s;
        }
        button:hover {
            background: #ff3366;
            transform: translateY(-2px);
        }
        .hotspot {
            background: #ff3366;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 3px solid white;
            box-shadow: 0 0 12px #ff3366;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            color: white;
            pointer-events: auto;
            transition: transform 0.2s;
        }
        .hotspot:hover {
            transform: scale(1.3);
        }
        .info-box {
            position: absolute;
            background: rgba(0,0,0,0.85);
            padding: 12px 18px;
            border-radius: 10px;
            max-width: 220px;
            font-size: 0.95em;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            box-shadow: 0 0 15px rgba(255,51,102,0.5);
        }
    </style>
</head>
<body>
    <h1>ريو ريبر</h1>
    <p class="subtitle">Riyo Reaper • عضو فريق Cleaners - Team Akuta • Gachiakuta</p>

    <model-viewer id="viewer" 
        src="3d_pic.glb" 
        alt="ريو ريبر من Gachiakuta" 
        camera-controls 
        auto-rotate 
        shadow-intensity="2" 
        exposure="0.9"
        environment-intensity="1.2"
        ar 
        ar-modes="webxr scene-viewer quick-look"
        camera-orbit="45deg 75deg 3m"
        style="background-color: #1a1a1a;">

        <!-- Hotspots -->
        <!-- 1. الشعر الأحمر -->
        <button slot="hotspot-hair" class="hotspot" data-position="0.1m 1.2m 0.3m" data-normal="0 1 0">
            👩‍🦰
        </button>
        <!-- 2. الوجه -->
        <button slot="hotspot-face" class="hotspot" data-position="0.05m 0.85m 0.4m" data-normal="0 0 1">
            👀
        </button>
        <!-- 3. الـ Ripper (المقص) - افتراضي على الجانب أو الرجل -->
        <button slot="hotspot-ripper" class="hotspot" data-position="-0.4m 0.3m 0.2m" data-normal="0 0 1">
            ✂️
        </button>
        <!-- 4. الجاكيت -->
        <button slot="hotspot-jacket" class="hotspot" data-position="0m 0.6m 0.35m" data-normal="0 1 0">
            🧥
        </button>

    </model-viewer>

    <div class="controls">
        <button onclick="setCamera('45deg 75deg 3m')">وضعية كاملة</button>
        <button onclick="setCamera('10deg 80deg 1.2m')">كلوز أب الوجه</button>
        <button onclick="setCamera('90deg 60deg 2.5m')">جانبي (Side View)</button>
        <button onclick="setCamera('30deg 40deg 2.8m')">وضعية قتالية</button>
        
        <button onclick="changeLighting('')">إضاءة عادية</button>
        <button onclick="changeLighting('red')">إضاءة حمراء درامية</button>
        <button onclick="changeLighting('dark')">ظلام بيت (Pit)</button>
    </div>

    <div style="max-width: 700px; margin: 20px auto; padding: 0 15px; line-height: 1.7;">
        <p><strong>ريو ريبر</strong> — قاتلة سابقة، الآن Cleaner. أداتها الحيوية: <strong>The Ripper</strong> (مقص عملاق تستخدمه برجليها).</p>
        <p>اسحب للدوران • اضغط على النقاط الحمراء لمعلومات • جرب زر AR على الجوال</p>
    </div>

    <a href="3d_pic.glb" download="Riyo_Reaper.glb" style="margin: 20px; padding: 12px 28px; background: #ff3366; color: white; text-decoration: none; border-radius: 50px; font-weight: bold; display: inline-block;">
        تحميل الموديل (GLB)
    </a>

    <script>
        const modelViewer = document.querySelector('#viewer');

        // وظيفة تغيير الكاميرا
        function setCamera(orbit) {
            modelViewer.cameraOrbit = orbit;
        }

        // تغيير الإضاءة (بسيطة)
        function changeLighting(mode) {
            if (mode === 'red') {
                modelViewer.environmentIntensity = 1.8;
                modelViewer.exposure = 1.1;
                // يمكن إضافة environment-image لو عندك صورة HDR حمراء
            } else if (mode === 'dark') {
                modelViewer.environmentIntensity = 0.6;
                modelViewer.exposure = 0.7;
            } else {
                modelViewer.environmentIntensity = 1.2;
                modelViewer.exposure = 0.9;
            }
        }

        // إضافة تفاعل بسيط مع الـ hotspots (عرض نص عند الضغط)
        modelViewer.addEventListener('load', () => {
            const hotspots = modelViewer.querySelectorAll('button[slot^="hotspot"]');
            hotspots.forEach(hotspot => {
                hotspot.addEventListener('click', (e) => {
                    let msg = '';
                    if (hotspot.slot === 'hotspot-hair') msg = 'شعر ريو المتطاير الشهير 🔥';
                    else if (hotspot.slot === 'hotspot-face') msg = 'عيون خضراء براغماتية.. شخصية مرحة في الحياة وخطيرة في القتال';
                    else if (hotspot.slot === 'hotspot-ripper') msg = 'The Ripper ⚔️\nأداة ريو الحيوية - مقص عملاق بقوة مرعبة';
                    else if (hotspot.slot === 'hotspot-jacket') msg = 'جاكيت الـ Cleaner';

                    alert(msg);   // يمكن استبداله بـ div popup أجمل
                });
            });
        });
    </script>
</body>
</html>
