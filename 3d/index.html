<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أداة التعيين بالنقر المباشر</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        body { margin: 0; font-family: sans-serif; background: #1a1a1a; color: white; display: flex; height: 100vh; overflow: hidden; }
        
        /* لوحة التحكم الجانبية */
        .sidebar { width: 350px; background: #252525; padding: 20px; border-left: 1px solid #444; overflow-y: auto; box-shadow: -5px 0 15px rgba(0,0,0,0.5); }
        
        .instruction-box { background: #333; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px dashed #ff3366; }
        
        .point-selector { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .point-btn { padding: 10px; border: 1px solid #555; background: #444; color: white; cursor: pointer; border-radius: 5px; text-align: center; }
        .point-btn.active { background: #ff3366; border-color: white; font-weight: bold; }

        .coord-view { background: #000; padding: 10px; border-radius: 5px; font-family: monospace; font-size: 0.85em; color: #00ff88; margin-bottom: 10px; }
        
        model-viewer { flex-grow: 1; background: #1a1a1a; cursor: crosshair; }

        /* ستايل النقاط */
        .hotspot {
            width: 20px; height: 20px; border-radius: 50%; border: 2px solid white;
            background: #ff3366; box-shadow: 0 0 10px rgba(255,51,102,0.8);
            pointer-events: none; /* لكي لا تعيق النقرة خلفها */
        }
        .hotspot span { position: absolute; top: -20px; left: 50%; transform: translateX(-50%); background: black; padding: 2px 6px; border-radius: 4px; font-size: 10px; }

        button#copyBtn { width: 100%; padding: 15px; background: #2c8c5a; border: none; color: white; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>🎯 تعيين النقاط بالنقر</h2>
        <div class="instruction-box">
            1. اختر رقم النقطة من الأسفل.<br>
            2. <b>انقر على المودل</b> في المكان المطلوب.<br>
            3. سيتم سحب الإحداثيات فوراً.
        </div>

        <div class="point-selector">
            <div class="point-btn active" onclick="selectPoint(1)" id="btn-1">نقطة 1</div>
            <div class="point-btn" onclick="selectPoint(2)" id="btn-2">نقطة 2</div>
            <div class="point-btn" onclick="selectPoint(3)" id="btn-3">نقطة 3</div>
            <div class="point-btn" onclick="selectPoint(4)" id="btn-4">نقطة 4</div>
        </div>

        <div id="outputs">
            </div>

        <button id="copyBtn">📋 نسخ كود الـ HTML النهائي</button>
    </div>

    <model-viewer id="viewer" src="3d_pic.glb" camera-controls shadow-intensity="1">
        <button slot="hotspot-1" id="hp-1" class="hotspot" data-position="0m 0m 0m" data-normal="0 1 0"><span>1</span></button>
        <button slot="hotspot-2" id="hp-2" class="hotspot" data-position="0m 0m 0m" data-normal="0 1 0"><span>2</span></button>
        <button slot="hotspot-3" id="hp-3" class="hotspot" data-position="0m 0m 0m" data-normal="0 1 0"><span>3</span></button>
        <button slot="hotspot-4" id="hp-4" class="hotspot" data-position="0m 0m 0m" data-normal="0 1 0"><span>4</span></button>
    </model-viewer>

    <script>
        const viewer = document.getElementById('viewer');
        let activePoint = 1;
        const savedCoords = {};

        // اختيار النقطة المراد تعديلها
        window.selectPoint = (num) => {
            activePoint = num;
            document.querySelectorAll('.point-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${num}`).classList.add('active');
        };

        // الحدث السحري: النقر لتحديد الموقع
        viewer.addEventListener('click', (event) => {
            const rect = viewer.getBoundingClientRect();
            const x = event.clientX - rect.left;
            const y = event.clientY - rect.top;

            // الحصول على الموقع والـ Normal من مكان النقرة بالضبط
            const hit = viewer.positionAndNormalFromPoint(x, y);

            if (hit) {
                const { position, normal } = hit;
                
                // تحويلها لنصوص مفهومة للمحرك
                const posStr = `${position.x}m ${position.y}m ${position.z}m`;
                const normStr = `${normal.x} ${normal.y} ${normal.z}`;

                // تحديث النقطة على المودل فوراً
                const hotspot = document.getElementById(`hp-${activePoint}`);
                hotspot.setAttribute('data-position', posStr);
                hotspot.setAttribute('data-normal', normStr);

                // حفظ القيم للعرض والنسخ
                savedCoords[activePoint] = { pos: posStr, norm: normStr };
                updateUI();
            }
        });

        function updateUI() {
            let html = "";
            for(let i=1; i<=4; i++) {
                const data = savedCoords[i] || { pos: 'لم تحدد بعد', norm: '0 1 0' };
                html += `
                    <div style="margin-bottom:15px">
                        <strong style="color:#ff3366">نقطة ${i}:</strong>
                        <div class="coord-view">${data.pos}</div>
                    </div>
                `;
            }
            document.getElementById('outputs').innerHTML = html;
        }

        document.getElementById('copyBtn').onclick = () => {
            let finalCode = "\n";
            for(let i=1; i<=4; i++) {
                if(savedCoords[i]) {
                    finalCode += `<button slot="hotspot-${i}" data-position="${savedCoords[i].pos}" data-normal="${savedCoords[i].norm}"></button>\n`;
                }
            }
            navigator.clipboard.writeText(finalCode);
            alert("تم نسخ الكود النهائي بنجاح!");
        };

        updateUI();
    </script>
</body>
</html>
