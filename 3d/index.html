<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أداة ضبط النقاط الأربعة - كاملة ومصححة</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
    <style>
        body { margin: 0; padding: 20px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: white; direction: rtl; }
        h1 { text-align: center; color: #ff3366; margin-bottom: 5px; }
        .container { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; margin-top: 20px; }
        model-viewer { flex: 2; min-width: 500px; height: 75vh; background: #1e1e1e; border-radius: 15px; border: 1px solid #333; }
        .controls-panel { flex: 1; min-width: 320px; background: #1e1e1e; border-radius: 15px; padding: 15px; max-height: 75vh; overflow-y: auto; }
        .hotspot-card { background: #2d2d2d; padding: 12px; border-radius: 10px; margin-bottom: 15px; border-right: 5px solid #ff3366; }
        .hotspot-card h3 { margin: 0 0 10px 0; font-size: 0.9em; color: #ff99bb; }
        .inputs { display: flex; gap: 8px; align-items: center; }
        .inputs label { font-size: 0.8em; color: #aaa; }
        input { width: 60px; background: #3d3d3d; border: 1px solid #555; color: white; padding: 5px; border-radius: 5px; text-align: center; }
        .code-output { background: #000; padding: 10px; border-radius: 5px; font-family: monospace; font-size: 0.75em; margin-top: 10px; white-space: pre-wrap; word-break: break-all; color: #00ff88; }
        button#copyBtn { width: 100%; padding: 12px; background: #ff3366; border: none; color: white; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        button#copyBtn:hover { background: #ff5588; }

        /* ستايل النقاط داخل المودل */
        .hotspot {
            width: 30px; height: 30px; border-radius: 50%; border: 2px solid #fff;
            background: #00ff88; cursor: pointer; box-shadow: 0 0 10px rgba(0,255,136,0.8);
            display: flex; justify-content: center; align-items: center;
        }
        .hotspot span { font-size: 18px; color: black; font-weight: bold; pointer-events: none; }
    </style>
</head>
<body>

    <h1>🔧 أداة التحكم بالنقاط الأربعة</h1>
    <p style="text-align:center; color: #aaa;">عدّل الأرقام وستتحرك النقاط فوراً على المجسم</p>

    <div class="container">
        <model-viewer id="viewer" src="3d_pic.glb" camera-controls shadow-intensity="1" camera-orbit="0deg 75deg 3m">
            <button slot="hotspot-1" id="hp-1" class="hotspot" data-position="-0.35m 1.1m 0.3m" data-normal="0 1 0"><span>1</span></button>
            <button slot="hotspot-2" id="hp-2" class="hotspot" data-position="-0.3m 0.55m 0.35m" data-normal="0 1 0"><span>2</span></button>
            <button slot="hotspot-3" id="hp-3" class="hotspot" data-position="0.35m 1.1m 0.3m" data-normal="0 1 0"><span>3</span></button>
            <button slot="hotspot-4" id="hp-4" class="hotspot" data-position="0.3m 0.55m 0.35m" data-normal="0 1 0"><span>4</span></button>
        </model-viewer>

        <div class="controls-panel" id="controls">
            </div>
    </div>

    <script>
        const viewer = document.getElementById('viewer');
        const controlsContainer = document.getElementById('controls');
        
        // إعدادات النقاط الأربعة
        const points = [
            { id: 1, label: "اليسرى 1 (شعر/كتف)", x: -0.35, y: 1.1, z: 0.3 },
            { id: 2, label: "اليسرى 2 (يد/خصر)", x: -0.30, y: 0.55, z: 0.35 },
            { id: 3, label: "اليمنى 1 (شعر/كتف)", x: 0.35, y: 1.1, z: 0.3 },
            { id: 4, label: "اليمنى 2 (يد/خصر)", x: 0.30, y: 0.55, z: 0.35 }
        ];

        // إنشاء لوحة التحكم ديناميكياً
        points.forEach(p => {
            const card = document.createElement('div');
            card.className = 'hotspot-card';
            card.innerHTML = `
                <h3>📍 نقطة ${p.id}: ${p.label}</h3>
                <div class="inputs">
                    <label>X</label><input type="number" step="0.05" value="${p.x}" data-point="${p.id}" data-axis="x">
                    <label>Y</label><input type="number" step="0.05" value="${p.y}" data-point="${p.id}" data-axis="y">
                    <label>Z</label><input type="number" step="0.05" value="${p.z}" data-point="${p.id}" data-axis="z">
                </div>
            `;
            controlsContainer.appendChild(card);
        });

        // إضافة زر النسخ في النهاية
        const copyBtn = document.createElement('button');
        copyBtn.id = "copyBtn";
        copyBtn.innerText = "📋 نسخ الكود النهائي للنقاط";
        controlsContainer.appendChild(copyBtn);

        const outputArea = document.createElement('div');
        outputArea.className = 'code-output';
        outputArea.id = "finalCode";
        controlsContainer.appendChild(outputArea);

        // وظيفة التحديث الفوري
        function updatePositions() {
            let finalHTML = "";
            points.forEach(p => {
                const x = document.querySelector(`input[data-point="${p.id}"][data-axis="x"]`).value;
                const y = document.querySelector(`input[data-point="${p.id}"][data-axis="y"]`).value;
                const z = document.querySelector(`input[data-point="${p.id}"][data-axis="z"]`).value;
                
                const hotspot = document.getElementById(`hp-${p.id}`);
                const posString = `${x}m ${y}m ${z}m`;
                
                // التحديث الفعلي على المودل
                hotspot.setAttribute('data-position', posString);
                
                // تجهيز النص للنسخ
                finalHTML += `<button slot="hotspot-${p.id}" data-position="${posString}" data-normal="0 1 0"></button>\n`;
            });
            outputArea.innerText = finalHTML;
        }

        // استماع للتغييرات في كل المدخلات
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('input', updatePositions);
        });

        // تنفيذ التحديث لأول مرة عند التحميل
        updatePositions();

        // وظيفة زر النسخ
        copyBtn.onclick = () => {
            navigator.clipboard.writeText(outputArea.innerText);
            alert("تم نسخ الكود بنجاح!");
        };
    </script>
</body>
</html>
